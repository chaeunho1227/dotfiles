# ── Shell ──
# 세션 $SHELL이 bash여도 zsh로 (p10k 환경 로드). mac/ubuntu 공통.
shell zsh

# ── Font (Nerd Font — p10k 아이콘) ──
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── 동작 ──
scrollback_lines        10000
enabled_layouts         tall,stack
confirm_os_window_close 0
cursor_blink_interval   0

# ── Mac 스타일 키 ──
# macOS: Option 키를 Alt로 → 셸 단어 이동(Option+←/→)이 동작. (linux는 Alt가 기본 Alt)
macos_option_as_alt yes

# 줄 처음/끝 (셸): Cmd+←/→  (cmd 맵은 macOS에서만 동작, linux는 무시)
map cmd+left  send_text all \x1b[H
map cmd+right send_text all \x1b[F
# Cmd+Backspace → 커서~줄 처음 삭제 (Ctrl+U)
map cmd+backspace send_text all \x15
# Option+Backspace → 단어 삭제 (Ctrl+W) — macos_option_as_alt로 linux와 동일 감각
map alt+backspace send_text all \x17

# ── 복사/붙여넣기 (우분투: keyd가 Cmd+C/V를 Ctrl+Insert / Shift+Insert로 보냄) ──
# Ctrl+C는 순수 중단(SIGINT) 유지. 복사/붙여넣기는 Insert 키로 분리 → GUI·터미널 공통,
# nvim의 Ctrl+V(비주얼 블록)도 안 깨짐.
map ctrl+insert  copy_to_clipboard
map shift+insert paste_from_clipboard
