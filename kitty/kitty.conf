# в”Җв”Җ Shell в”Җв”Җ
# м„ём…ҳ $SHELLмқҙ bashм—¬лҸ„ zshлЎң (p10k нҷҳкІҪ лЎңл“ң). mac/ubuntu кіөнҶө.
shell zsh

# в”Җв”Җ Font (Nerd Font вҖ” p10k м•„мқҙмҪҳ) в”Җв”Җ
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# в”Җв”Җ лҸҷмһ‘ в”Җв”Җ
scrollback_lines        10000
enabled_layouts         tall,stack
confirm_os_window_close 0
cursor_blink_interval   0

# в”Җв”Җ Mac мҠӨнғҖмқј нӮӨ в”Җв”Җ
# macOS: Option нӮӨлҘј AltлЎң вҶ’ м…ё лӢЁм–ҙ мқҙлҸҷ(Option+вҶҗ/вҶ’)мқҙ лҸҷмһ‘. (linuxлҠ” Altк°Җ кё°ліё Alt)
macos_option_as_alt yes

# мӨ„ мІҳмқҢ/лҒқ (м…ё): Cmd+вҶҗ/вҶ’  (cmd л§өмқҖ macOSм—җм„ңл§Ң лҸҷмһ‘, linuxлҠ” л¬ҙмӢң)
map cmd+left  send_text all \x1b[H
map cmd+right send_text all \x1b[F
# Cmd+Backspace вҶ’ м»Өм„ң~мӨ„ мІҳмқҢ мӮӯм ң (Ctrl+U)
map cmd+backspace send_text all \x15
# Option+Backspace вҶ’ лӢЁм–ҙ мӮӯм ң (Ctrl+W) вҖ” macos_option_as_altлЎң linuxмҷҖ лҸҷмқј к°җк°Ғ
map alt+backspace send_text all \x17
