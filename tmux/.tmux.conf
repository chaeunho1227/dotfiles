
# ────────────────────────────────────────

# Claude Code 필수 설정

# ────────────────────────────────────────

set -g allow-passthrough on # 알림/프로그레스바 필수

set -sg escape-time 0 # ESC 딜레이 제거

set -g history-limit 250000 # Claude 대량 출력 대비

set -g focus-events on # 커서 정상 동작

set -g set-clipboard on # SSH 복붙 안정성

set -g mouse on

# ────────────────────────────────────────

# 기본 설정

# ────────────────────────────────────────

set -g default-terminal "tmux-256color"

set -ag terminal-overrides ",xterm-256color:RGB"

# 기본 셸 = zsh (세션 $SHELL이 bash여도 강제). mac=/bin/zsh, ubuntu=/usr/bin/zsh
if-shell '[ -x /usr/bin/zsh ]' 'set -g default-shell /usr/bin/zsh'
if-shell '[ -x /bin/zsh ]' 'set -g default-shell /bin/zsh'

set -g base-index 1

setw -g pane-base-index 1

set -g renumber-windows on

# ────────────────────────────────────────

# Prefix: Ctrl+a

# ────────────────────────────────────────

unbind C-b

set -g prefix C-a

bind C-a send-prefix

# ────────────────────────────────────────

# 키 바인딩

# ────────────────────────────────────────

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind | split-window -h -c "#{pane_current_path}"

bind - split-window -v -c "#{pane_current_path}"

unbind '"'

unbind %

bind c new-window -c "#{pane_current_path}"

bind h select-pane -L

bind j select-pane -D

bind k select-pane -U

bind l select-pane -R

bind -r H resize-pane -L 5

bind -r J resize-pane -D 5

bind -r K resize-pane -U 5

bind -r L resize-pane -R 5

# ────────────────────────────────────────

# Claude 팝업 세션 (prefix + y)

# ────────────────────────────────────────

bind -r y run-shell '\

SESSION="claude-$(echo #{pane_current_path} | (md5 2>/dev/null || md5sum) | cut -c1-8)"; \

tmux has-session -t "$SESSION" 2>/dev/null || \

tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \

tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# ────────────────────────────────────────

# 복사 모드 (vim 스타일)

# ────────────────────────────────────────

setw -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection

if-shell 'command -v pbcopy >/dev/null' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"' \
  'bind -T copy-mode-vi y send -X copy-selection-and-cancel'

# ────────────────────────────────────────

# 상태바

# ────────────────────────────────────────

set -g status-position bottom

set -g status-interval 5

# Catppuccin 창/모듈 표시 옵션 (TPM run 전에 설정)
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_default_fill 'number'
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_date_time_text ' %Y-%m-%d %H:%M'
set -g @catppuccin_directory_text ' #{b:pane_current_path}'
# cpu/ram 라벨 (아이콘만으론 헷갈려서 글자 추가)
set -g @catppuccin_cpu_text ' CPU #{l:#{cpu_percentage}}'
set -g @catppuccin_ram_text ' RAM #{l:#{ram_percentage}}'

# pane border
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ────────────────────────────────────────

# TPM 플러그인

# ────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'

run '~/.tmux/plugins/tpm/tpm'

# ── 상태바 모듈 (TPM 로드 후에 설정해야 적용됨) ──
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_session}'
set -agF status-right '#{E:@catppuccin_status_directory}'
set -agF status-right '#{E:@catppuccin_status_cpu}'
set -agF status-right '#{E:@catppuccin_status_ram}'
set -agF status-right '#{E:@catppuccin_status_date_time}'

# tmux-cpu는 문자열 치환식이라, status-right 완성 후 재실행해야 #{cpu_percentage}/#{ram_percentage}가 채워짐
run-shell '~/.tmux/plugins/tmux-cpu/cpu.tmux'
