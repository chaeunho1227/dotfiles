
# ────────────────────────────────────────

# Claude Code 필수 설정

# ────────────────────────────────────────

set -g allow-passthrough on # 알림/프로그레스바 필수

set -sg escape-time 0 # ESC 딜레이 제거

set -g history-limit 250000 # Claude 대량 출력 대비

set -g focus-events on # 커서 정상 동작

set -g set-clipboard on # SSH 복붙 안정성

set -g mouse on

# ────────────────────────────────────────

# 기본 설정

# ────────────────────────────────────────

set -g default-terminal "tmux-256color"

set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1

setw -g pane-base-index 1

set -g renumber-windows on

# ────────────────────────────────────────

# Prefix: Ctrl+a

# ────────────────────────────────────────

unbind C-b

set -g prefix C-a

bind C-a send-prefix

# ────────────────────────────────────────

# 키 바인딩

# ────────────────────────────────────────

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

bind | split-window -h -c "#{pane_current_path}"

bind - split-window -v -c "#{pane_current_path}"

unbind '"'

unbind %

bind c new-window -c "#{pane_current_path}"

bind h select-pane -L

bind j select-pane -D

bind k select-pane -U

bind l select-pane -R

bind -r H resize-pane -L 5

bind -r J resize-pane -D 5

bind -r K resize-pane -U 5

bind -r L resize-pane -R 5

# ────────────────────────────────────────

# Claude 팝업 세션 (prefix + y)

# ────────────────────────────────────────

bind -r y run-shell '\

SESSION="claude-$(echo #{pane_current_path} | (md5 2>/dev/null || md5sum) | cut -c1-8)"; \

tmux has-session -t "$SESSION" 2>/dev/null || \

tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \

tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# ────────────────────────────────────────

# 복사 모드 (vim 스타일)

# ────────────────────────────────────────

setw -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection

if-shell 'command -v pbcopy >/dev/null' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"' \
  'bind -T copy-mode-vi y send -X copy-selection-and-cancel'

# ────────────────────────────────────────

# 상태바

# ────────────────────────────────────────

set -g status-position bottom

set -g status-interval 5

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left " #S "

set -g status-left-style "bg=#89b4fa,fg=#1e1e2e,bold"

set -g status-left-length 20

set -g status-right " %Y-%m-%d %H:%M "

set -g status-right-style "bg=#313244,fg=#cdd6f4"

set -g window-status-format " #I:#W "

set -g window-status-current-format " #I:#W "

set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"

set -g pane-border-style "fg=#313244"

set -g pane-active-border-style "fg=#89b4fa"

# ────────────────────────────────────────

# TPM 플러그인

# ────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
